services:
  - type: web
    name: trend-pulse-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Set all of these in the Render dashboard (Environment tab).
      - key: FRONTEND_ORIGIN
        sync: false        # your Vercel URL, or "*" to start
      - key: GROQ_API_KEY
        sync: false        # the LLM that powers all AI features
      - key: UPSTASH_REDIS_REST_URL
        sync: false        # persistent cache across restarts
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GNEWS_API_KEY
        sync: false        # news counts + drill-down
      - key: GITHUB_TOKEN
        sync: false        # repo counts
      - key: TRENDPULSE_DEMO
        value: "0"         # keep off in prod (only sample-data fallback)
      # Optional:
      - key: HUGGINGFACE_API_TOKEN
        sync: false        # LLM fallback if Groq is unset
      - key: BRAVE_API_KEY
        sync: false        # better competitor discovery (else keyless DuckDuckGo)
      - key: YOUTUBE_API_KEY
        sync: false        # video counts (you skipped this)
